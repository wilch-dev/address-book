opencollection: 1.0.0

info:
  name: Address Book API
  description: RESTful API for managing addresses with distance-based retrieval

config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

bundled: false
extensions: {}

requests:
  - uid: create-address
    name: Create Address
    method: POST
    url: http://localhost:8000/addresses
    headers:
      - name: Content-Type
        value: application/json
    body:
      mode: json
      json:
        address: "123 Main St, New York, NY 10001, USA"
        latitude: 40.7128
        longitude: -74.0060

  - uid: get-all-addresses
    name: Get All Addresses
    method: GET
    url: http://localhost:8000/addresses
    headers: []
    body: null

  - uid: get-single-address
    name: Get Single Address
    method: GET
    url: http://localhost:8000/addresses/1
    headers: []
    body: null

  - uid: update-address
    name: Update Address
    method: PUT
    url: http://localhost:8000/addresses/1
    headers:
      - name: Content-Type
        value: application/json
    body:
      mode: json
      json:
        address: "456 Updated St, New York, NY 10002, USA"

  - uid: delete-address
    name: Delete Address
    method: DELETE
    url: http://localhost:8000/addresses/1
    headers: []
    body: null

  - uid: search-nearby-addresses-50km
    name: Search Nearby Addresses (50km from NYC)
    method: GET
    url: http://localhost:8000/addresses/nearby/search?latitude=40.7128&longitude=-74.0060&distance_km=50
    headers: []
    body: null

  - uid: search-nearby-addresses-10km
    name: Search Nearby Addresses (10km from LA)
    method: GET
    url: http://localhost:8000/addresses/nearby/search?latitude=34.0522&longitude=-118.2437&distance_km=10
    headers: []
    body: null

  - uid: create-address-nyc-2
    name: Create Address - NYC 2
    method: POST
    url: http://localhost:8000/addresses
    headers:
      - name: Content-Type
        value: application/json
    body:
      mode: json
      json:
        address: "456 Park Ave, New York, NY 10022, USA"
        latitude: 40.7614
        longitude: -73.9776

  - uid: create-address-nyc-3
    name: Create Address - NYC 3
    method: POST
    url: http://localhost:8000/addresses
    headers:
      - name: Content-Type
        value: application/json
    body:
      mode: json
      json:
        address: "789 Broadway, New York, NY 10003, USA"
        latitude: 40.7505
        longitude: -73.9972

  - uid: create-address-la
    name: Create Address - Los Angeles
    method: POST
    url: http://localhost:8000/addresses
    headers:
      - name: Content-Type
        value: application/json
    body:
      mode: json
      json:
        address: "321 5th Ave, Los Angeles, CA 90001, USA"
        latitude: 34.0522
        longitude: -118.2437
